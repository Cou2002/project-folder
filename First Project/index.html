<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #f9f9f9;
        }

        .completed {
            color: red;
            text-decoration: line-through;
        }

        .container {
            border-radius: 15px;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f9f9f9;
        }

        .container>h4 {
            margin-bottom: 5px;
            font-family: cursive;
            text-align: center;
            font-weight: bolder;
            font-size: 25px;
        }

        #ul-list {
            border: 1px solid #ccc;
            padding: 0px;
            list-style-type: none;
        }

        span {
            margin: 0px 100px 0px 5px;
        }

        .input--button-con {}

        #ul-list li {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ccc;
            padding: 7px 0px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <h4>To Do App</h4>

        <div class="input--button-con">
            <input type="text" id="taskInput" placeholder='add task'>
            <button type="button" id="addTask">AddTask</button>
        </div>
        <ul id="ul-list"></ul>

    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addTask');
        const displayTask = document.getElementById('ul-list');
        const empty = document.getElementById('empty');


        addBtn.addEventListener('click', addTask);
        function addTask() {
            const li = document.createElement('li');
            const checkBox = document.createElement('input');
            checkBox.type = 'checkbox';
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = "Delete"

            const taskValue = taskInput.value.trim();

            if (taskValue === "") {
                alert("Input can not be empty!");
                return;
            }

            const span = document.createElement('span');
            span.textContent = taskValue;

            checkBox.addEventListener('change', function () {
                span.classList.toggle('completed')
            })

            deleteBtn.addEventListener('click', function () {
                li.remove();
            });


            li.appendChild(checkBox);
            li.appendChild(span);
            li.appendChild(deleteBtn)
            displayTask.appendChild(li);

            //const local = JSON.parse(localStorage.getItem('to-do-app')) || span;
            // localStorage.setItem('to-do-app', JSON.stringify(span))

            taskInput.value = '';
            taskInput.focus();
        }



    </script>
</body>

</html>
